version: '3.8'

services:
  dns-resolver:
    build: .
    container_name: dns-recursive-resolver
    ports:
      - "3000:3000"
    volumes:
      - dns-data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=/app/data/dns.db
    restart: unless-stopped

  dns-frontend:
    build: ./frontend
    container_name: dns-visualizer-frontend
    ports:
      - "8080:80"
    depends_on:
      - dns-resolver
    restart: unless-stopped

volumes:
  dns-data:
